version: 0.1
updated: 2026-06-07
kind: template

# 仅作为模板。实时项目状态应放在：
# - <UnityProject>/.mlgs/state.yaml
# - projects/<slug>/.mlgs/state.yaml

active_project:
  name: ""
  slug: ""
  mode: none # none | internal | external-adopted | embedded
  workspace_path: ""
  external_path: ""
  engine: Unity
  engine_version: ""
  approved_write_paths: []

automation:
  planning: high
  production: medium

phase:
  current: not-started
  allowed_values:
    - not-started
    - idea-alignment
    - concept-package
    - design-tech-plan
    - prototype-validation
    - production
    - polish-ship

approvals:
  idea_alignment: false
  concept_package: false
  design_tech_plan: false
  prototype_validation: false
  production_unblocked: false

prototype:
  policy: recommended # recommended | required | skipped-with-risk | not-needed
  type: html-or-unity-greybox
  verdict: pending # pending | pass | revise | skipped
  skip_reason: ""

next_action:
  command: start
  reason: "尚未配置活动项目。"

assumptions: []

risks: []

version: 0.2
updated: 2026-06-30
kind: template

# Template only. Live state belongs in:
# - <UnityProject>/.mlgs/state.yaml
# - projects/<slug>/.mlgs/state.yaml

active_project:
  name: ""
  slug: ""
  mode: none # none | internal | external-adopted | embedded
  workspace_path: ""
  external_path: ""
  engine: Unity
  language: C#
  engine_version: ""
  approved_write_paths: []

owner_participation:
  level: medium # low | medium | high
  notes: ""

automation:
  planning: high
  production: medium

phase:
  current: not-started
  allowed_values:
    - not-started
    - intake
    - concept
    - plan
    - prototype
    - production
    - release

approvals:
  project_selected: false
  concept_package: false
  design_tech_plan: false
  prototype_validation: false
  production_unblocked: false

prototype:
  policy: recommended # recommended | required | skipped-with-risk | not-needed
  type: html-or-unity-greybox
  verdict: pending # pending | pass | revise | skipped
  skip_reason: ""

next_action:
  command: start
  reason: "No active project is configured."
  options:
    - "/mlgs start"
    - "/mlgs adopt <UnityProject>"
    - "/mlgs help"

assumptions: []

risks: []

staff:
  last_lead: producer
  last_agents: []

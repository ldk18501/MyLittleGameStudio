<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyLittleGameStudio Office</title>
  <script src="./studio-data.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d2433;
      --muted: #667085;
      --line: #d7dde8;
      --paper: #f7f8fb;
      --panel: #ffffff;
      --blue: #2563eb;
      --green: #16855b;
      --amber: #a15c07;
      --red: #b42318;
      --violet: #6f3cc3;
      --teal: #087d8f;
      --desk: #e8edf5;
      --desk-edge: #a7b2c5;
      --floor: #eef2f7;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--paper);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      min-height: 100vh;
    }

    .main {
      padding: 24px;
      display: grid;
      grid-template-rows: auto minmax(420px, 1fr);
      gap: 16px;
    }

    .side {
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 24px;
      overflow: auto;
      max-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0;
    }

    p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .meta {
      text-align: right;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      min-width: 180px;
    }

    .office {
      position: relative;
      min-height: 520px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(29, 36, 51, 0.045) 1px, transparent 1px),
        linear-gradient(180deg, rgba(29, 36, 51, 0.045) 1px, transparent 1px),
        var(--floor);
      background-size: 34px 34px;
    }

    .room-label {
      position: absolute;
      top: 14px;
      left: 16px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.88);
      font-size: 12px;
      color: var(--muted);
    }

    .desk-grid {
      position: absolute;
      inset: 58px 22px 22px;
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      grid-auto-rows: minmax(150px, 1fr);
      gap: 18px;
    }

    .desk {
      position: relative;
      min-width: 0;
      border: 1px solid var(--desk-edge);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(29, 36, 51, 0.08);
      padding: 12px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    .desk::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: -10px;
      height: 10px;
      border: 1px solid var(--desk-edge);
      border-top: 0;
      border-radius: 0 0 6px 6px;
      background: var(--desk);
    }

    .agent-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .agent-name {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 6px;
      border: 1px solid currentColor;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .status-idle { color: var(--muted); }
    .status-active { color: var(--blue); }
    .status-completed { color: var(--green); }
    .status-partial { color: var(--amber); }
    .status-blocked { color: var(--red); }

    .role {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .task {
      min-height: 38px;
      font-size: 13px;
      line-height: 1.45;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .last {
      font-size: 11px;
      color: var(--muted);
    }

    .signal {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      height: 6px;
    }

    .signal span {
      border-radius: 4px;
      background: var(--line);
    }

    .desk[data-status="active"] .signal span { background: var(--blue); }
    .desk[data-status="completed"] .signal span { background: var(--green); }
    .desk[data-status="partial"] .signal span { background: var(--amber); }
    .desk[data-status="blocked"] .signal span { background: var(--red); }

    .panel {
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
      margin-bottom: 18px;
    }

    .summary {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcff;
      font-size: 14px;
      line-height: 1.5;
    }

    .event {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      background: var(--panel);
    }

    .event-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .event-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 11px;
      color: var(--muted);
      background: #fbfcff;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    @media (max-width: 1020px) {
      .app {
        grid-template-columns: 1fr;
      }

      .side {
        max-height: none;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 760px) {
      .main,
      .side {
        padding: 16px;
      }

      .topbar {
        display: block;
      }

      .meta {
        text-align: left;
        margin-top: 10px;
      }

      .desk-grid {
        position: static;
        padding: 58px 14px 18px;
        grid-template-columns: 1fr;
      }

      .office {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="main">
      <header class="topbar">
        <div>
          <h1>MyLittleGameStudio Office</h1>
          <p id="summaryText">加载中</p>
        </div>
        <div class="meta">
          <div id="updatedText">Updated: -</div>
          <div id="commandText">Command: -</div>
        </div>
      </header>

      <section class="office" aria-label="Agent office activity">
        <div class="room-label">Agent Office</div>
        <div class="desk-grid" id="deskGrid"></div>
      </section>
    </main>

    <aside class="side">
      <section class="panel">
        <h2>当前摘要</h2>
        <div class="summary" id="detailSummary">暂无活动。</div>
        <div class="legend">
          <span class="badge status-active">active</span>
          <span class="badge status-completed">completed</span>
          <span class="badge status-partial">partial</span>
          <span class="badge status-blocked">blocked</span>
          <span class="badge status-idle">idle</span>
        </div>
      </section>

      <section class="panel">
        <h2>项目状态</h2>
        <div class="summary" id="projectSummary">暂无活动项目。</div>
      </section>

      <section>
        <h2>最近活动</h2>
        <div id="eventList"></div>
      </section>
    </aside>
  </div>

  <script>
    const defaultAgents = [
      ["producer", "Producer", "Coordination, routing, scope, state"],
      ["creative-director", "Creative Director", "Game vision, references, creative direction"],
      ["game-designer", "Game Designer", "Rules, systems, tuning, acceptance criteria"],
      ["unity-architect", "Unity Architect", "Unity structure, technical plan, build risk"],
      ["gameplay-developer", "Gameplay Developer", "Gameplay code and production implementation"],
      ["ui-ux-developer", "UI/UX Developer", "Interface, interaction, readability"],
      ["technical-artist", "Technical Artist", "Visual systems, VFX, generated art, performance"],
      ["qa-lead", "QA Lead", "Verification, risks, release checks"]
    ].map(([id, name, role]) => ({ id, name, role, status: "idle", lastEvent: "", currentTask: "" }));

    const data = window.MLGS_STUDIO_DATA || {};
    const runtime = data.runtime || {};
    const project = runtime.project || {};
    const agents = Array.isArray(runtime.agents) && runtime.agents.length ? runtime.agents : defaultAgents;
    const events = Array.isArray(data.events) ? data.events.slice().reverse() : [];

    const statusLabels = {
      idle: "idle",
      active: "active",
      completed: "completed",
      partial: "partial",
      blocked: "blocked"
    };

    function formatTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString();
    }

    function normalizeStatus(value) {
      return statusLabels[value] ? value : "idle";
    }

    function createDesk(agent) {
      const status = normalizeStatus(agent.status);
      const desk = document.createElement("article");
      desk.className = `desk status-${status}`;
      desk.dataset.status = status;

      desk.innerHTML = `
        <div class="agent-head">
          <div class="agent-name" title="${agent.name || agent.id}">${agent.name || agent.id}</div>
          <span class="badge status-${status}">${status}</span>
        </div>
        <div>
          <div class="role">${agent.role || ""}</div>
          <div class="task">${agent.currentTask || "Waiting for routed work."}</div>
        </div>
        <div>
          <div class="signal" aria-hidden="true"><span></span><span></span><span></span></div>
          <div class="last">Last event: ${formatTime(agent.lastEvent)}</div>
        </div>
      `;
      return desk;
    }

    function createEvent(event) {
      const status = normalizeStatus(event.status);
      const item = document.createElement("article");
      item.className = "event";

      const agentsUsed = Array.isArray(event.agentsUsed) ? event.agentsUsed : [];
      const skillsUsed = Array.isArray(event.skillsUsed) ? event.skillsUsed : [];
      const filesWritten = Array.isArray(event.filesWritten) ? event.filesWritten : [];

      item.innerHTML = `
        <div class="event-title">${event.title || "Untitled activity"}</div>
        <div class="event-meta">
          ${formatTime(event.timestamp)} · ${event.command || "unknown"} · <span class="status-${status}">${status}</span>
        </div>
        <p>${event.summary || ""}</p>
        <div class="chips">
          ${agentsUsed.map(value => `<span class="chip">agent: ${value}</span>`).join("")}
          ${skillsUsed.map(value => `<span class="chip">skill: ${value}</span>`).join("")}
          ${filesWritten.map(value => `<span class="chip">write: ${value}</span>`).join("")}
        </div>
      `;
      return item;
    }

    document.getElementById("summaryText").textContent = runtime.summary || "No MLGS activity has been recorded yet.";
    document.getElementById("detailSummary").textContent = runtime.summary || "暂无活动。";
    document.getElementById("projectSummary").textContent = [
      project.name ? `Project: ${project.name}` : "Project: none",
      project.phase ? `Phase: ${project.phase}` : "Phase: -",
      project.participation ? `Participation: ${project.participation}` : "Participation: -",
      project.nextCommand ? `Next: /mlgs ${project.nextCommand}` : "Next: -"
    ].join(" · ");
    document.getElementById("updatedText").textContent = `Updated: ${formatTime(runtime.updated || data.generatedAt)}`;
    document.getElementById("commandText").textContent = `Command: ${runtime.activeCommand || "none"}`;

    const deskGrid = document.getElementById("deskGrid");
    agents.forEach(agent => deskGrid.appendChild(createDesk(agent)));

    const eventList = document.getElementById("eventList");
    if (events.length) {
      events.forEach(event => eventList.appendChild(createEvent(event)));
    } else {
      eventList.innerHTML = `<div class="empty">还没有活动记录。运行一次 MLGS 任务后，这里会显示被调用的 agent、skill 和写入文件。</div>`;
    }
  </script>
</body>
</html>

version: 0.2
name: MyLittleGameStudio Codex Workflow
updated: 2026-06-30

principles:
  - Keep the studio small and fast.
  - Unity + C# only.
  - Prefer autonomous progress under the selected owner participation level.
  - Keep one canonical project state file.
  - Use prototypes to lower risk, but allow an explicit skipped-with-risk path.
  - Every production task should end with verification evidence or a clear blocker.

phases:
  - id: intake
    name: Intake
    lead: producer
    purpose: Choose new game, existing project, current project, or pointer recovery.
    commands:
      - start
      - adopt
      - status
      - help
    required_artifacts:
      - project/.mlgs/state.yaml
      - project/.mlgs/project.md
    exit_gate:
      project_selected: true

  - id: concept
    name: Concept
    lead: creative-director
    purpose: Turn idea/reference/pitch into a compact playable direction.
    commands:
      - brainstorm
      - review
      - status
    required_artifacts:
      - project/design/concept-package.md
    exit_gate:
      concept_package: approved

  - id: plan
    name: Plan
    lead: game-designer
    purpose: Convert concept into systems, Unity technical plan, tasks, and prototype policy.
    commands:
      - plan
      - review
      - test
      - status
    required_artifacts:
      - project/design/systems/
      - project/docs/tech-plan.md
      - project/production/task-plan.md
    exit_gate:
      design_tech_plan: approved

  - id: prototype
    name: Prototype
    lead: gameplay-developer
    purpose: Validate the riskiest loop, input, camera, UI, physics, or performance assumption.
    commands:
      - prototype
      - test
      - status
    required_artifacts:
      - project/prototype/prototype-plan.md
      - project/prototype/playtest-report.md
    exit_gate:
      prototype_validation: pass-or-skipped-with-risk

  - id: production
    name: Production
    lead: unity-architect
    purpose: Implement approved Unity tasks in focused increments with verification.
    commands:
      - implement
      - fix
      - review
      - test
      - build
      - status
    required_artifacts:
      - project/production/tasks/
      - project/tests-or-qa-reports
    exit_gate:
      qa_review: pass

  - id: release
    name: Release
    lead: qa-lead
    purpose: Stabilize, build, test, and prepare a playable release.
    commands:
      - fix
      - review
      - test
      - build
      - status
    required_artifacts:
      - project/production/release-checklist.md
      - project/production/known-issues.md
    exit_gate:
      owner_release_approval: true

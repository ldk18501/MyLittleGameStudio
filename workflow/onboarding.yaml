version: 0.2
name: MyLittleGameStudio Codex Onboarding
updated: 2026-06-30

purpose: >
  Start MLGS from /mlgs plus natural language with the least possible friction. Detect context,
  choose new game vs existing Unity project, set owner participation, and hand
  off to the next command.

principles:
  - Codex-only, Unity-only.
  - Detect before asking.
  - Ask about the owner's situation, not internal fields.
  - Offer A/B/C/D choices for path and participation.
  - One next question or one next command.
  - Low participation means MLGS can act like staff, not a questionnaire.
  - High participation means the owner gets more visible choices and drafts.

state_signals:
  pointer_valid:
    meaning: studio/current-project.local.yaml points to an existing project .mlgs/state.yaml.
    next: status
  pointer_stale:
    meaning: local pointer exists but state_path or project_root is missing.
    next: repair-pointer
  template_only:
    meaning: no active project exists; studio/state.yaml is only a template.
    next: start
  project_has_mlgs_state:
    meaning: provided path contains .mlgs/state.yaml.
    next: status
  project_has_unity_files:
    meaning: provided path contains Assets/, ProjectSettings/, or Packages/manifest.json.
    next: adopt
  project_has_design_or_code:
    meaning: provided path contains design, docs, prototype, production, src, or C# files.
    next: adopt
  empty_workspace:
    meaning: no useful project artifacts detected.
    next: start

start_paths:
  new_game:
    label: "A) New game"
    description: "Start a new Unity game from an idea or blank page."
    first_question: "What seed should the studio start from: no idea, a rough theme, or a clear one-sentence pitch?"
    recommended_next: brainstorm
  adopt_existing:
    label: "B) Existing Unity project"
    description: "Attach an existing Unity project and inspect its state."
    first_question: "What is the Unity project directory?"
    recommended_next: adopt
  continue_current:
    label: "C) Continue current project"
    description: "Use the active project pointer if it is valid."
    first_question: "Do you want a status report or should the studio pick the next useful task?"
    recommended_next: status
  repair_or_switch:
    label: "D) Repair or switch"
    description: "Fix a stale pointer or choose a different project."
    first_question: "Should I repair to a new project path, or clear the pointer and start again?"
    recommended_next: status

participation_levels:
  low:
    label: "A) Low participation"
    description: "Hands-off owner. MLGS decides, drafts, implements, checks, and only asks at major gates."
    behavior: "autonomous"
  medium:
    label: "B) Medium participation"
    description: "Balanced. MLGS executes routine work and asks before major direction or architecture changes."
    behavior: "balanced"
  high:
    label: "C) High participation"
    description: "Hands-on owner. MLGS presents more options and concise plans before meaningful edits."
    behavior: "collaborative"

guided_start_prompt:
  text: "How should MLGS start today?"
  options:
    - id: new_game
      label: "A) New game"
      description: "Create or shape a new Unity game idea."
    - id: adopt_existing
      label: "B) Existing Unity project"
      description: "Inspect and attach an existing project directory."
    - id: continue_current
      label: "C) Continue current project"
      description: "Use the active project if one is configured."
    - id: repair_or_switch
      label: "D) Repair or switch"
      description: "Fix a stale pointer or choose another project."

participation_prompt:
  text: "How much do you want to participate in day-to-day decisions?"
  options:
    - id: low
      label: "A) Low"
      description: "You want to be mostly hands-off."
    - id: medium
      label: "B) Medium"
      description: "You want balanced collaboration."
    - id: high
      label: "C) High"
      description: "You want to tune details with the studio."

status_response:
  required_sections:
    - active project or recovery issue
    - owner participation
    - current phase
    - staff activity
    - completed artifacts
    - missing artifacts
    - risks
    - recommended command
    - A/B/C/D next options

adoption_report:
  required_checks:
    - Unity version and Assets/ProjectSettings/Packages presence
    - existing .mlgs state
    - owner participation setting
    - design docs and concept
    - prototype docs or folders
    - production plan and tasks
    - source/code scale
    - tests or QA evidence
    - approved write path recommendation
  output_rule: "Findings first, one recommendation, then one question: adopt now, inspect more, or cancel."

